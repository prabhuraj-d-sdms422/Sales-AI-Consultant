services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: ./backend
    ports:
      - "8000:6003"
    env_file: .env
    environment:
      REDIS_HOST: redis
      # Backend runs inside Docker, so it must talk to the container's internal port.
      REDIS_PORT: 6379
    depends_on:
      - redis
    volumes:
      - backend_data:/app/data
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: always

volumes:
  redis_data:
  backend_data:
